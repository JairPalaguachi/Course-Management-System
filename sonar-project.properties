sonar.projectKey=CourseManagementSystem
sonar.projectName=Course Management System
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src
sonar.tests=backend
sonar.test.inclusions=backend/**/tests.py,backend/**/test_*.py

sonar.exclusions=**/node_modules/**,**/dist/**,**/venv/**,**/__pycache__/**,**/migrations/**,**/coverage.xml,**/.pytest_cache/**

sonar.python.coverage.reportPaths=backend/coverage.xml

sonar.host.url=http://localhost:9000